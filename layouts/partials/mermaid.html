{{ if .Page.Store.Get "hasMermaid" }}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ 
    startOnLoad: true,
    theme: 'dark',
    themeVariables: {
      darkMode: true,
      primaryColor: '#e94560',
      primaryTextColor: '#fff',
      primaryBorderColor: '#e94560',
      lineColor: '#533483',
      secondaryColor: '#0f3460',
      tertiaryColor: '#1a1a2e'
    }
  });
</script>
{{ end }}

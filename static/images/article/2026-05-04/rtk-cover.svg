<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dark gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    
    <!-- Cyan glow -->
    <radialGradient id="cyanGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Emerald glow -->
    <radialGradient id="emeraldGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Amber glow -->
    <radialGradient id="amberGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    
    <!-- Arrow marker -->
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" opacity="0.8"/>
    </marker>
    <marker id="arrowEmerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" opacity="0.8"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" opacity="0.8"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>
  
  <!-- Ambient glows -->
  <ellipse cx="300" cy="315" rx="250" ry="200" fill="url(#cyanGlow)"/>
  <ellipse cx="900" cy="315" rx="200" ry="180" fill="url(#emeraldGlow)"/>
  <ellipse cx="600" cy="500" rx="300" ry="150" fill="url(#amberGlow)"/>
  
  <!-- === LEFT SIDE: Input tokens (large, flowing right) === -->
  <!-- Token particles - input side (large) -->
  <g opacity="0.9">
    <rect x="80" y="140" width="70" height="32" rx="4" fill="#22d3ee" opacity="0.2" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="115" y="161" font-family="monospace" font-size="13" fill="#22d3ee" text-anchor="middle">TOKEN</text>
    
    <rect x="60" y="190" width="85" height="32" rx="4" fill="#22d3ee" opacity="0.15" stroke="#22d3ee" stroke-width="1"/>
    <text x="102" y="211" font-family="monospace" font-size="12" fill="#22d3ee" text-anchor="middle">PROMPT</text>
    
    <rect x="90" y="240" width="60" height="32" rx="4" fill="#22d3ee" opacity="0.2" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="120" y="261" font-family="monospace" font-size="13" fill="#22d3ee" text-anchor="middle">CODE</text>
    
    <rect x="50" y="290" width="90" height="32" rx="4" fill="#22d3ee" opacity="0.15" stroke="#22d3ee" stroke-width="1"/>
    <text x="95" y="311" font-family="monospace" font-size="12" fill="#22d3ee" text-anchor="middle">CONTEXT</text>
    
    <rect x="70" y="340" width="75" height="32" rx="4" fill="#22d3ee" opacity="0.2" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="107" y="361" font-family="monospace" font-size="13" fill="#22d3ee" text-anchor="middle">QUERY</text>
    
    <rect x="85" y="390" width="65" height="32" rx="4" fill="#22d3ee" opacity="0.15" stroke="#22d3ee" stroke-width="1"/>
    <text x="117" y="411" font-family="monospace" font-size="12" fill="#22d3ee" text-anchor="middle">INPUT</text>
    
    <rect x="55" y="440" width="80" height="32" rx="4" fill="#22d3ee" opacity="0.18" stroke="#22d3ee" stroke-width="1"/>
    <text x="95" y="461" font-family="monospace" font-size="12" fill="#22d3ee" text-anchor="middle">SYSTEM</text>
  </g>
  
  <!-- === FLOW ARROWS (input side - wide) === -->
  <g opacity="0.6">
    <line x1="170" y1="156" x2="320" y2="240" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
    <line x1="165" y1="206" x2="320" y2="260" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
    <line x1="170" y1="256" x2="320" y2="280" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arrowCyan)"/>
    <line x1="160" y1="306" x2="320" y2="300" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arrowCyan)"/>
    <line x1="165" y1="356" x2="320" y2="320" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
    <line x1="170" y1="406" x2="320" y2="340" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
    <line x1="155" y1="456" x2="320" y2="355" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  </g>
  
  <!-- === CENTER: Funnel / Compressor === -->
  <!-- Funnel shape -->
  <path d="M 320 210 L 320 410 L 580 355 L 580 265 Z" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.8"/>
  <path d="M 320 210 L 320 410 L 580 355 L 580 265 Z" fill="#fbbf24" opacity="0.04"/>
  
  <!-- Funnel inner lines -->
  <line x1="360" y1="225" x2="560" y2="275" stroke="#fbbf24" stroke-width="0.8" opacity="0.3"/>
  <line x1="360" y1="395" x2="560" y2="345" stroke="#fbbf24" stroke-width="0.8" opacity="0.3"/>
  <line x1="320" y1="310" x2="580" y2="310" stroke="#fbbf24" stroke-width="0.5" opacity="0.2" stroke-dasharray="4,4"/>
  
  <!-- Compression waves inside funnel -->
  <path d="M 380 270 Q 430 310 380 350" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.4"/>
  <path d="M 420 275 Q 460 310 420 345" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.35"/>
  <path d="M 460 280 Q 490 310 460 340" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
  <path d="M 500 285 Q 520 310 500 335" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.25"/>
  
  <!-- RTK label in center -->
  <rect x="400" y="285" width="120" height="50" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
  <text x="460" y="308" font-family="monospace" font-size="20" font-weight="bold" fill="#fbbf24" text-anchor="middle">RTK</text>
  <text x="460" y="327" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">COMPRESS</text>
  
  <!-- === FLOW ARROWS (output side - narrow) === -->
  <g opacity="0.6">
    <line x1="580" y1="290" x2="700" y2="295" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowEmerald)"/>
    <line x1="580" y1="310" x2="700" y2="310" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowEmerald)"/>
    <line x1="580" y1="330" x2="700" y2="325" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowEmerald)"/>
  </g>
  
  <!-- === RIGHT SIDE: Output tokens (small, compressed) === -->
  <g opacity="0.85">
    <rect x="720" y="270" width="55" height="28" rx="4" fill="#34d399" opacity="0.2" stroke="#34d399" stroke-width="1.5"/>
    <text x="747" y="289" font-family="monospace" font-size="11" fill="#34d399" text-anchor="middle">TOK</text>
    
    <rect x="720" y="305" width="60" height="28" rx="4" fill="#34d399" opacity="0.2" stroke="#34d399" stroke-width="1.5"/>
    <text x="750" y="324" font-family="monospace" font-size="11" fill="#34d399" text-anchor="middle">COMP</text>
    
    <rect x="720" y="340" width="50" height="28" rx="4" fill="#34d399" opacity="0.2" stroke="#34d399" stroke-width="1.5"/>
    <text x="745" y="359" font-family="monospace" font-size="11" fill="#34d399" text-anchor="middle">OPT</text>
  </g>
  
  <!-- Output arrows to LLM -->
  <g opacity="0.5">
    <line x1="795" y1="284" x2="870" y2="284" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowEmerald)"/>
    <line x1="795" y1="319" x2="870" y2="319" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowEmerald)"/>
    <line x1="785" y1="354" x2="870" y2="354" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowEmerald)"/>
  </g>
  
  <!-- LLM Cloud -->
  <g transform="translate(880, 275)">
    <ellipse cx="60" cy="50" rx="60" ry="35" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="60" cy="50" rx="40" ry="22" fill="#34d399" opacity="0.05"/>
    <text x="60" y="47" font-family="monospace" font-size="14" font-weight="bold" fill="#34d399" text-anchor="middle">LLM</text>
    <text x="60" y="63" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">API</text>
  </g>
  
  <!-- === TERMINAL WINDOW (top-right) === -->
  <g transform="translate(780, 100)">
    <rect width="340" height="130" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5" opacity="0.9"/>
    <!-- Terminal title bar -->
    <rect width="340" height="28" rx="8" fill="#1e293b"/>
    <rect y="20" width="340" height="8" fill="#1e293b"/>
    <circle cx="18" cy="14" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="34" cy="14" r="5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="50" cy="14" r="5" fill="#34d399" opacity="0.7"/>
    <text x="170" y="18" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">terminal</text>
    
    <!-- Terminal content -->
    <text x="15" y="48" font-family="monospace" font-size="11" fill="#64748b">$ <tspan fill="#22d3ee">rtk</tspan> <tspan fill="#94a3b8">serve --port 8080</tspan></text>
    <text x="15" y="66" font-family="monospace" font-size="10" fill="#34d399">✓ Proxy listening on :8080</text>
    <text x="15" y="82" font-family="monospace" font-size="10" fill="#94a3b8">Tokens: <tspan fill="#22d3ee">12,840</tspan> → <tspan fill="#34d399">3,210</tspan> <tspan fill="#fbbf24">(-75%)</tspan></text>
    <text x="15" y="98" font-family="monospace" font-size="10" fill="#94a3b8">Cost:   <tspan fill="#22d3ee">$0.038</tspan> → <tspan fill="#34d399">$0.009</tspan> <tspan fill="#fbbf24">(-76%)</tspan></text>
    <text x="15" y="118" font-family="monospace" font-size="11" fill="#64748b">$ <tspan fill="#22d3ee" opacity="0.8">█</tspan></text>
  </g>
  
  <!-- === COST SAVINGS BADGE === -->
  <g transform="translate(950, 440)">
    <rect width="160" height="55" rx="10" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5" opacity="0.9"/>
    <text x="80" y="25" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">SAVINGS</text>
    <text x="80" y="47" font-family="monospace" font-size="22" font-weight="bold" fill="#fbbf24" text-anchor="middle">~75%</text>
  </g>
  
  <!-- === SMALL CODE SNIPPETS (decorative) === -->
  <g opacity="0.15" font-family="monospace" font-size="9" fill="#22d3ee">
    <text x="50" y="530">fn compress_tokens(input: &amp;[Token]) -> Vec&lt;Token&gt; {</text>
    <text x="50" y="545">    let filtered = input.iter()</text>
    <text x="50" y="560">        .filter(|t| !t.is_redundant())</text>
    <text x="50" y="575">        .dedup_by(|a, b| a.similar(b));</text>
    <text x="50" y="590">    filtered.collect()</text>
    <text x="50" y="605">}</text>
  </g>
  
  <!-- Right side decorative code -->
  <g opacity="0.1" font-family="monospace" font-size="9" fill="#34d399">
    <text x="820" y="530">[rtk::proxy]</text>
    <text x="820" y="545">intercept = true</text>
    <text x="820" y="560">compress = "aggressive"</text>
    <text x="820" y="575">cache_ttl = 3600</text>
    <text x="820" y="590">max_tokens = 4096</text>
  </g>
  
  <!-- === TITLE AREA === -->
  <text x="600" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="-1">Rust Token Killer</text>
  <text x="600" y="115" font-family="monospace" font-size="16" fill="#22d3ee" text-anchor="middle" letter-spacing="2">RTK</text>
  
  <!-- Subtitle -->
  <text x="600" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">CLI proxy that slashes LLM token consumption • Built in Rust 🦀</text>
  
  <!-- Decorative separator lines -->
  <line x1="430" y1="130" x2="770" y2="130" stroke="#334155" stroke-width="0.5"/>
  <line x1="460" y1="135" x2="740" y2="135" stroke="#334155" stroke-width="0.3"/>
  
  <!-- Rust crab icon hint -->
  <g transform="translate(555, 145)" opacity="0.3">
    <text x="0" y="18" font-size="24" fill="#fbbf24">🦀</text>
  </g>
  
  <!-- Subtle border -->
  <rect x="1" y="1" width="1198" height="628" rx="12" fill="none" stroke="#334155" stroke-width="1"/>
</svg>